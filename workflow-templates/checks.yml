# Thin caller that delegates to the shared reusable workflow in
# kaisekidev/.github (.github/workflows/checks.yml@v1). The reusable workflow
# runs the established tooling (shivammathur setup-php, Composer cache,
# `composer update`, check-deps/cs-check/phpstan, phpunit + coverage-monitor)
# across the 8.2/8.3/8.4 matrix. Default = strict: phpunit + 100% coverage gate
# (reported on the 8.4 leg). Uncomment `with:` to override per package.

name: Checks

on:
  pull_request:
  push:
    branches: [master]

# Reusable workflows can only restrict the caller's permissions, never elevate
# them — and the reusable workflow declares `statuses: write` (for the
# coverage-monitor commit status) at its top level on EVERY run. So a caller
# that sets a `permissions:` block MUST include `statuses: write`: a block that
# omits it grants fewer permissions than the reusable workflow declares, which
# GitHub rejects with a `startup_failure` before any job runs.
#
# Packages that opt out of coverage (run-tests: false or coverage-threshold: 0)
# don't use the status — but must NOT drop just that one line. Remove the ENTIRE
# `permissions:` block instead, so the reusable workflow's declared permissions
# apply unrestricted.
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  checks:
    uses: kaisekidev/.github/.github/workflows/checks.yml@v1
    # with:
    #   coverage-threshold: 0          # opt out of the 100% gate until tests catch up
    #   run-tests: false               # static-analysis only (the variant-A packages)
    #   php-versions: '["8.2","8.3","8.4"]'
