name: Bug report
description: Something is broken or behaves unexpectedly.
title: "fix: "
labels: ["type:fix"]
body:
  - type: textarea
    id: whats-wrong
    attributes:
      label: What's wrong
      description: One-line summary of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual
      value: |
        - Expected:
        - Actual:
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: repo, PHP version, OS, anything relevant.
    validations:
      required: false
