name: Migration task
description: A cross-cutting change applied across packages to the same recipe.
title: "chore: migrate "
type: Migration
body:
  - type: textarea
    id: target
    attributes:
      label: Target
      description: The packages this covers and the recipe/steps applied.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Variant (A/B), known BC concerns, downstream consumers.
    validations:
      required: false
